  /fabricSiteHealthSummaries/{id}/trendAnalytics:
    get:
      tags:
      - fabricSiteHealthSummaries
      summary: The Trend analytics data for a fabric site in the specified time range
      description: |-
        Get health time series for a specific Fabric Site by providing the unique Fabric site id in the url path.

        The data will be grouped based on the specified trend time interval. If startTime and endTime are not provided, the API defaults to the last 24 hours.

        By default:
        - the number of records returned will be 500.
        - the records will be sorted in time ascending (`asc`) order

        ex: id:93a25378-7740-4e20-8d90-0060ad9a1be0

        This API provides the latest health data until the given `endTime`. If data is not ready for the provided endTime, the request will fail with error code `400 Bad Request`, and the error message will indicate the recommended endTime to use to retrieve a complete data set. This behavior may occur if the provided endTime=currentTime, since we are not a real time system. When `endTime` is not provided, the API returns the latest data.
      operationId: readFabricSitesTrendById
      parameters:
      - name: id
        in: path
        description: unique fabric site id
        required: true
        schema:
          type: string
      - name: X-CALLER-ID
        in: header
        description: |
          Caller ID is used to trace the origin of API calls and their associated queries executed on the database. It's an optional header parameter that can be added to an API request.
        required: false
        schema:
          type: string
          default: unknown
        example: ui:client360
      - name: startTime
        in: query
        description: |
          Start time from which API queries the data set related to the resource. It must be specified in UNIX epochtime in milliseconds. Value is inclusive.
        schema:
          type: integer
          format: int64
        example: 1705348800000
      - name: endTime
        in: query
        description: |
          End time to which API queries the data set related to the resource. It must be specified in UNIX epochtime in milliseconds. Value is inclusive.
        required: false
        schema:
          type: integer
          format: int64
        example: 1705435200000
      - name: trendInterval
        in: query
        description: "The time window to aggregate the metrics. \nInterval can be 5 minutes or 10 minutes or 1 hour or 1 day or 7 days\n"
        required: true
        style: form
        explode: false
        schema:
          type: string
          enum:
          - 5MIN
          - 10MIN
          - 1HR
          - 1DAY
          - 7DAY
      - name: limit
        in: query
        description: Maximum number of records to return
        schema:
          maximum: 500
          minimum: 1
          type: integer
          default: 100
      - name: offset
        in: query
        description: Specifies the starting point within all records returned by the API. It's one based offset. The starting value is 1.
        schema:
          minimum: 1
          type: integer
          default: 1
      - name: order
        in: query
        description: The sort order of the field ascending or descending.
        schema:
          type: string
          default: asc
          enum:
          - asc
          - desc
      - name: attribute
        in: query
        description: "Supported Attributes:\n\n[goodHealthPercentage, goodHealthDeviceCount, totalHealthDeviceCount,poorHealthDeviceCount,fairHealthDeviceCount, connectivityGoodHealthPercentage, connectivityTotalHealthDeviceCount, connectivityGoodHealthDeviceCount, connectivityPoorHealthDeviceCount, connectivityFairHealthDeviceCount, infraGoodHealthPercentage, infraTotalHealthDeviceCount, infraGoodHealthDeviceCount, infraPoorHealthDeviceCount, infraFairHealthDeviceCount, controlPlaneGoodHealthPercentage, controlPlaneTotalHealthDeviceCount, controlPlaneGoodHealthDeviceCount,controlPlanePoorHealthDeviceCount, controlPlaneFairHealthDeviceCount, pubsubInfraVnGoodHealthPercentage, pubsubInfraVnTotalHealthDeviceCount, pubsubInfraVnGoodHealthDeviceCount, pubsubInfraVnPoorHealthDeviceCount, pubsubInfraVnFairHealthDeviceCount, bgpEvpnGoodHealthPercentage, bgpEvpnTotalHealthDeviceCount, bgpEvpnGoodHealthDeviceCount,bgpEvpnPoorHealthDeviceCount, bgpEvpnFairHealthDeviceCount, ctsEnvDataDownloadGoodHealthPercentage, ctsEnvDataDownloadTotalHealthDeviceCount, ctsEnvDataDownloadGoodHealthDeviceCount, ctsEnvDataDownloadPoorHealthDeviceCount, ctsEnvDataDownloadFairHealthDeviceCount, aaaStatusGoodHealthPercentage, aaaStatusTotalHealthDeviceCount, aaaStatusGoodHealthDeviceCount, aaaStatusPoorHealthDeviceCount, aaaStatusFairHealthDeviceCount, portChannelGoodHealthPercentage, portChannelTotalHealthDeviceCount, portChannelGoodHealthDeviceCount, portChannelPoorHealthDeviceCount, portChannelFairHealthDeviceCount, peerScoreGoodHealthPercentage, peerScoreTotalHealthDeviceCount, peerScoreGoodHealthDeviceCount, peerScorePoorHealthDeviceCount, peerScoreFairHealthDeviceCount, lispSessionGoodHealthPercentage, lispSessionTotalHealthDeviceCount, lispSessionGoodHealthDeviceCount, lispSessionPoorHealthDeviceCount, lispSessionFairHealthDeviceCount, borderToControlPlaneGoodHealthPercentage, borderToControlPlaneTotalHealthDeviceCount, borderToControlPlaneGoodHealthDeviceCount, borderToControlPlanePoorHealthDeviceCount, borderToControlPlaneFairHealthDeviceCount, bgpBgpSiteGoodHealthPercentage, bgpBgpSiteTotalHealthDeviceCount, bgpBgpSiteGoodHealthDeviceCount, bgpBgpSitePoorHealthDeviceCount, bgpBgpSiteFairHealthDeviceCount, bgpPubsubSiteGoodHealthPercentage, bgpPubsubSiteTotalHealthDeviceCount, bgpPubsubSiteGoodHealthDeviceCount, bgpPubsubSitePoorHealthDeviceCount, bgpPubsubSiteFairHealthDeviceCount, bgpPeerInfraVnScoreGoodHealthPercentage, bgpPeerInfraVnTotalHealthDeviceCount, bgpPeerInfraVnGoodHealthDeviceCount, bgpPeerInfraVnPoorHealthDeviceCount, bgpPeerInfraVnFairHealthDeviceCount]\n\nIf length of attribute list is too long, please use 'view' param instead.\n\nExamples:\n\nattribute=GoodHealthPercentage (single attribute requested)\n\nattribute=GoodHealthPercentage&attribute=connectivityGoodHealthPercentage (multiple attributes requested) \n"
        required: false
